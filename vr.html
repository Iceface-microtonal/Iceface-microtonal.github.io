<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3LDK ウォーキングシミュレーター</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{overflow:hidden;background:#000;font-family:'Helvetica Neue',sans-serif}
canvas#main{display:block}
#overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.88);display:flex;align-items:center;justify-content:center;z-index:100;cursor:pointer}
#overlay-content{text-align:center;color:#fff;max-width:480px;padding:40px}
#overlay-content h1{font-size:32px;margin-bottom:8px;font-weight:200;letter-spacing:6px}
#overlay-content h2{font-size:14px;margin-bottom:28px;font-weight:300;color:#999;letter-spacing:2px}
.cr{display:flex;align-items:center;margin:6px 0;font-size:13px;color:#bbb}
.ck{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);padding:3px 12px;border-radius:4px;font-size:11px;color:#fff;min-width:70px;text-align:center;margin-right:12px;font-weight:500}
.sb{margin-top:28px;font-size:16px;color:#6af;letter-spacing:3px}
#crosshair{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:3px;height:3px;background:rgba(255,255,255,.35);border-radius:50%;z-index:50;pointer-events:none;box-shadow:0 0 6px rgba(255,255,255,.15)}
#room-label{position:fixed;top:16px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,.85);font-size:15px;z-index:50;pointer-events:none;letter-spacing:4px;font-weight:300;transition:opacity .6s;background:rgba(0,0,0,.45);padding:5px 22px;border-radius:16px;backdrop-filter:blur(4px)}
#minimap{position:fixed;top:16px;right:16px;z-index:50;pointer-events:none;opacity:.85;border-radius:8px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,.4)}
#xr-status{position:fixed;left:50%;bottom:84px;transform:translateX(-50%);z-index:130;max-width:88vw;padding:6px 12px;border-radius:12px;background:rgba(0,0,0,.62);color:#fff;font-size:12px;letter-spacing:.2px;pointer-events:none;opacity:0;transition:opacity .25s}
#vr-btn{position:fixed;left:50%;bottom:30px;transform:translateX(-50%);z-index:140;padding:10px 20px;border-radius:999px;border:1px solid rgba(255,255,255,.45);background:rgba(56,126,255,.92);color:#fff;font-size:14px;letter-spacing:.8px;cursor:pointer;display:none}
#vr-btn:disabled{cursor:not-allowed;opacity:.55}
</style>
</head>
<body>
<div id="overlay" onclick="startGame()">
<div id="overlay-content">
<h1>3LDK</h1>
<h2>WALKING SIMULATOR</h2>
<div class="cr"><span class="ck">W A S D</span>移動</div>
<div class="cr"><span class="ck">Shift</span>ダッシュ</div>
<div class="cr"><span class="ck">マウス</span>視点操作</div>
<div class="cr"><span class="ck">M</span>ミニマップ</div>
<div class="sb">▶ クリックして入室</div>
</div>
</div>
<div id="crosshair"></div>
<div id="room-label"></div>
<div id="xr-status" role="status" aria-live="polite"></div>
<button id="vr-btn" type="button">ENTER VR</button>
<canvas id="minimap" width="150" height="190"></canvas>
<canvas id="main"></canvas>
<script src="https://cdn.jsdelivr.net/npm/three@0.161.0/build/three.min.js"></script>
<script>
"use strict";

/* ── constants ── */
const WH=2.4, WT=0.08, PH=1.55, PR=0.2, SPD=2.6, SPRT=1.7, SENS=0.002, STEP_H=0.12;

/* ── Three.js setup ── */
const scene=new THREE.Scene();
scene.background=new THREE.Color(0x88ccee);
scene.fog=new THREE.FogExp2(0x88ccee,0.02);
const camera=new THREE.PerspectiveCamera(68,innerWidth/innerHeight,0.05,80);
camera.rotation.order='YXZ';
const renderer=new THREE.WebGLRenderer({canvas:document.getElementById('main'),antialias:true});
renderer.setSize(innerWidth,innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.shadowMap.enabled=true;
renderer.shadowMap.type=THREE.PCFSoftShadowMap;
renderer.toneMapping=THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure=1.1;
renderer.xr.enabled=true;
renderer.xr.setReferenceSpaceType('local-floor');

/* ── WebXR setup ── */
const crosshair=document.getElementById('crosshair');
const vrBtn=document.getElementById('vr-btn');
const xrStatus=document.getElementById('xr-status');
function setXRStatus(msg,isError=false){
  xrStatus.textContent=msg||"";
  xrStatus.style.opacity=msg?"1":"0";
  xrStatus.style.background=isError?'rgba(122,28,28,.85)':'rgba(0,0,0,.62)';
}
async function initXR(){
  if(!window.isSecureContext){
    setXRStatus('WebXRはHTTPSまたはlocalhostでのみ有効です。',true);
    return;
  }
  if(!("xr" in navigator)){
    setXRStatus('このブラウザはWebXR非対応です。',true);
    return;
  }
  try{
    const ok=await navigator.xr.isSessionSupported('immersive-vr');
    if(ok){
      vrBtn.style.display='block';
      setXRStatus('VR対応: QuestでENTER VRを押してください。');
    }else{
      setXRStatus('immersive-vr非対応のためVR起動できません。',true);
    }
  }catch(err){
    setXRStatus('VR対応確認に失敗しました: '+err.message,true);
    console.error('isSessionSupported failed:',err);
  }
}
async function enterVR(){
  if(!("xr" in navigator))return;
  try{
    if(renderer.xr.isPresenting){
      const active=renderer.xr.getSession();
      if(active)await active.end();
      return;
    }
    vrBtn.disabled=true;
    setXRStatus('VRセッションを開始中...');
    const session=await navigator.xr.requestSession('immersive-vr',{
      optionalFeatures:['local-floor','bounded-floor','hand-tracking']
    });
    await renderer.xr.setSession(session);
    setXRStatus('');
  }catch(err){
    setXRStatus('VR開始失敗: '+err.message,true);
    console.error('requestSession failed:',err);
  }finally{
    vrBtn.disabled=false;
  }
}
vrBtn.addEventListener('click',enterVR);
renderer.xr.addEventListener('sessionstart',()=>{
  document.getElementById('overlay').style.display='none';
  vrBtn.textContent='EXIT VR';
  crosshair.style.display='none';
  setXRStatus('VRセッション中');
});
renderer.xr.addEventListener('sessionend',()=>{
  vrBtn.textContent='ENTER VR';
  crosshair.style.display='block';
  setXRStatus('VRセッションを終了しました。');
});
initXR();

/* ── textures ── */
function mkTex(w,h,fn){const c=document.createElement('canvas');c.width=w;c.height=h;fn(c.getContext('2d'),w,h);const t=new THREE.CanvasTexture(c);t.wrapS=t.wrapT=THREE.RepeatWrapping;return t;}

const texWall=mkTex(256,256,(g,w,h)=>{g.fillStyle='#f2ede5';g.fillRect(0,0,w,h);for(let i=0;i<4e3;i++){g.fillStyle=`rgba(${210+Math.random()*45|0},${205+Math.random()*45|0},${195+Math.random()*40|0},.25)`;g.fillRect(Math.random()*w,Math.random()*h,2,2);}});
const texCeil=mkTex(64,64,(g,w,h)=>{g.fillStyle='#faf8f4';g.fillRect(0,0,w,h);});
const texWood=mkTex(512,512,(g,w,h)=>{g.fillStyle='#c4a46e';g.fillRect(0,0,w,h);const bw=60,bh=240;for(let x=0;x<w;x+=bw)for(let y=0;y<h;y+=bh){const o=(x/bw|0)%2*(bh/2),b=.88+Math.random()*.24;g.fillStyle=`rgb(${178*b|0},${148*b|0},${98*b|0})`;g.fillRect(x+1,y+o+1,bw-2,bh-2);for(let gy=0;gy<bh;gy+=6){g.fillStyle='rgba(120,95,60,.1)';g.fillRect(x+2,y+o+gy,bw-4,3);}}});texWood.repeat.set(3,3);
const texTatami=mkTex(256,512,(g,w,h)=>{g.fillStyle='#a4ad58';g.fillRect(0,0,w,h);for(let y=0;y<h;y+=2){g.fillStyle=y%4?'#a8b060':'#9ca850';g.fillRect(0,y,w,2);}g.strokeStyle='#6a7030';g.lineWidth=5;g.strokeRect(3,3,w-6,h-6);g.strokeStyle='#bcc468';g.lineWidth=1.5;g.beginPath();g.moveTo(w/2,5);g.lineTo(w/2,h-5);g.stroke();});
const texTile=mkTex(256,256,(g,w,h)=>{g.fillStyle='#e6ded4';g.fillRect(0,0,w,h);const s=32;for(let x=0;x<w;x+=s)for(let y=0;y<h;y+=s){const b=.94+Math.random()*.06;g.fillStyle=`rgb(${224*b|0},${216*b|0},${206*b|0})`;g.fillRect(x+1,y+1,s-2,s-2);}});texTile.repeat.set(3,3);
const texGenkan=mkTex(256,256,(g,w,h)=>{g.fillStyle='#807068';g.fillRect(0,0,w,h);const s=28;for(let x=0;x<w;x+=s)for(let y=0;y<h;y+=s){const b=.9+Math.random()*.1;g.fillStyle=`rgb(${122*b|0},${110*b|0},${100*b|0})`;g.fillRect(x+1,y+1,s-2,s-2);}});
const texConc=mkTex(256,256,(g,w,h)=>{g.fillStyle='#bab2a8';g.fillRect(0,0,w,h);for(let i=0;i<3e3;i++){g.fillStyle=`rgba(${140+Math.random()*50|0},${135+Math.random()*45|0},${128+Math.random()*40|0},.18)`;g.fillRect(Math.random()*w,Math.random()*h,3,3);}});texConc.repeat.set(3,1);

/* ── materials ── */
const M={
  wall:new THREE.MeshStandardMaterial({map:texWall,roughness:.92}),
  ceil:new THREE.MeshStandardMaterial({map:texCeil,roughness:.95}),
  wood:new THREE.MeshStandardMaterial({map:texWood,roughness:.65}),
  tatami:new THREE.MeshStandardMaterial({map:texTatami,roughness:.85}),
  tile:new THREE.MeshStandardMaterial({map:texTile,roughness:.55}),
  genkan:new THREE.MeshStandardMaterial({map:texGenkan,roughness:.78}),
  conc:new THREE.MeshStandardMaterial({map:texConc,roughness:.9}),
  glass:new THREE.MeshStandardMaterial({color:0xaaddff,transparent:true,opacity:.18,roughness:.05}),
  door:new THREE.MeshStandardMaterial({color:0xccb890,roughness:.65}),
  dkwd:new THREE.MeshStandardMaterial({color:0x65503c,roughness:.55}),
  kit:new THREE.MeshStandardMaterial({color:0xe5ddd5,roughness:.3}),
  met:new THREE.MeshStandardMaterial({color:0xcccccc,roughness:.2,metalness:.8}),
  wht:new THREE.MeshStandardMaterial({color:0xf4f4f4,roughness:.4}),
  fusuma:new THREE.MeshStandardMaterial({color:0xece4d8,roughness:.85}),
  mirror:new THREE.MeshStandardMaterial({color:0xccddee,metalness:.9,roughness:.05}),
  hood:new THREE.MeshStandardMaterial({color:0x999999,metalness:.4,roughness:.4}),
  bath:new THREE.MeshStandardMaterial({color:0xeae4de,roughness:.3}),
  frame:new THREE.MeshStandardMaterial({color:0x707070,metalness:.5,roughness:.3}),
};

/* ── collision segments ── */
const segs=[];
function seg(ax,az,bx,bz){segs.push({ax,az,bx,bz});}
function ptSeg(px,pz,ax,az,bx,bz){
  const dx=bx-ax,dz=bz-az,l2=dx*dx+dz*dz;
  if(l2<1e-8)return Math.hypot(px-ax,pz-az);
  const t=Math.max(0,Math.min(1,((px-ax)*dx+(pz-az)*dz)/l2));
  return Math.hypot(px-(ax+t*dx),pz-(az+t*dz));
}
function blocked(px,pz){
  for(const s of segs)if(ptSeg(px,pz,s.ax,s.az,s.bx,s.bz)<PR+WT/2)return true;
  return false;
}

/* ── build helpers ── */
function box(x,y,z,w,h,d,mat,cs=false){const m=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),mat);m.position.set(x+w/2,y+h/2,z+d/2);m.castShadow=cs;m.receiveShadow=true;scene.add(m);return m;}
function mkFloor(x,z,w,d,mat,y=.001){const m=new THREE.Mesh(new THREE.PlaneGeometry(w,d),mat);m.rotation.x=-Math.PI/2;m.position.set(x+w/2,y,z+d/2);m.receiveShadow=true;scene.add(m);}
function mkCeil(x,z,w,d){const m=new THREE.Mesh(new THREE.PlaneGeometry(w,d),M.ceil);m.rotation.x=Math.PI/2;m.position.set(x+w/2,WH,z+d/2);scene.add(m);}

// Visual wall with collision
function vw(ax,az,bx,bz,h=WH,mat=M.wall,col=true){
  const dx=bx-ax,dz=bz-az,len=Math.hypot(dx,dz);
  if(len<.01)return;
  const m=new THREE.Mesh(new THREE.BoxGeometry(WT,h,len),mat);
  m.position.set((ax+bx)/2,h/2,(az+bz)/2);
  m.rotation.y=Math.atan2(dx,dz);
  m.castShadow=true;m.receiveShadow=true;scene.add(m);
  if(col)seg(ax,az,bx,bz);
}

/* ============================================================
   APARTMENT LAYOUT (metres)
   
   X axis → east,  Z axis → south (toward balcony)

   Key X coordinates:
     0    1.9  2.7      4.2           7.0
   Key Z coordinates:
     0  1.1  1.7  3.1   4.5  5.9   8.2  9.3
   ============================================================ */
const X0=0, XBE=1.9, XWE=1.9, XWCE=2.7, XHW=2.7, XHE=4.2, XE=7.0;
const Z0=0, ZGS=1.1, ZBS=1.7, ZWS=3.1, ZHS=4.5, ZW1S=5.9, ZSS=8.2, ZBaS=9.3;

// ────── OUTER WALLS ──────
// North
vw(X0,Z0, XBE,Z0);       // bath north
vw(XBE,Z0, XHW,Z0);      // between
vw(XHW,Z0, 3.05,Z0);     // left of front door
vw(3.95,Z0, XHE,Z0);     // right of front door
vw(XHE,Z0, XE,Z0);       // youshitsu north

// East
vw(XE,Z0, XE,ZSS);

// West
vw(X0,Z0, X0,ZSS);

// South (with glass door gaps)
vw(X0,ZSS, 0.5,ZSS);     // LDK left solid
// gap 0.5→2.8  LDK glass door
vw(2.8,ZSS, 4.2,ZSS);    // between two glass doors
// gap 4.5→6.5  washitsu glass door
vw(4.2,ZSS, 4.5,ZSS);
vw(6.5,ZSS, XE,ZSS);     // right solid

// Balcony railing
vw(X0,ZBaS, XE,ZBaS, 1.05, M.conc);
vw(X0,ZSS, X0,ZBaS, 1.05, M.conc); // left side railing
vw(XE,ZSS, XE,ZBaS, 1.05, M.conc); // right side railing

// ────── INTERNAL WALLS ──────

// Bath south
vw(X0,ZBS, XBE,ZBS);

// Bath east (door gap 0.5→1.2)
vw(XBE,Z0, XBE,0.5);
vw(XBE,1.2, XBE,ZBS);

// Washroom/WC divider
vw(XWE,ZBS, XWE,ZWS);

// Washroom south (door gap 0.6→1.3)
vw(X0,ZWS, 0.6,ZWS);
vw(1.3,ZWS, XHW,ZWS);

// Hall west wall: from genkan south edge down
// Upper part: genkan to WC door  (door gap 2.3→2.9)
vw(XHW,ZGS, XHW,2.3);
vw(XHW,2.9, XHW,ZWS);
// Lower part: continues to LDK (open at south end → door gap 3.8→4.5)
vw(XHW,ZWS, XHW,3.8);
// gap 3.8→4.5 hallway opens into LDK
// no wall below 4.5 on this line

// WC north wall
vw(XWE,ZBS, XWCE,ZBS);

// Hall east wall = divider to private rooms
// Section 1: youshitsu door gap 0.3→1.0
vw(XHE,Z0, XHE,0.3);
vw(XHE,1.0, XHE,2.6);
// Section 2: closet zone 2.6→3.2 (wall continues solid)
vw(XHE,2.6, XHE,3.2);
// Section 3: washitsu1 door gap 3.5→4.2
vw(XHE,3.2, XHE,3.5);
vw(XHE,4.2, XHE,ZHS);
// Section 4: LDK/washitsu2 fusuma gap 6.2→7.5
vw(XHE,ZHS, XHE,6.2);
vw(XHE,7.5, XHE,ZSS);

// Youshitsu south / closet north
vw(XHE,2.6, XE,2.6);

// Closet back wall
vw(XHE,3.2, 5.5,3.2);
vw(5.5,3.2, XE,3.2);
// Closet divider
vw(5.5,2.6, 5.5,3.2);

// Washitsu1 / Washitsu2 divider (fusuma gap 5.0→6.3)
vw(XHE,ZW1S, 5.0,ZW1S);
vw(6.3,ZW1S, XE,ZW1S);

// ────── GLASS DOORS (visual only, no collision) ──────
function glassPanel(cx,cz,w,rotY=0){
  const m=new THREE.Mesh(new THREE.BoxGeometry(w,2,WT),M.glass);
  m.position.set(cx,1,cz);m.rotation.y=rotY;scene.add(m);
  [-w/2,0,w/2].forEach(o=>{
    const f=new THREE.Mesh(new THREE.BoxGeometry(.025,2,.025),M.frame);
    const fx=cx+o*Math.cos(rotY), fz=cz+o*Math.sin(rotY);
    f.position.set(fx,1,fz);scene.add(f);
  });
  // Upper wall
  const uw=new THREE.Mesh(new THREE.BoxGeometry(w,WH-2,WT),M.wall);
  uw.position.set(cx,2+(WH-2)/2,cz);uw.rotation.y=rotY;scene.add(uw);
}
glassPanel(1.65,ZSS, 2.3);     // LDK balcony door
glassPanel(5.5,ZSS, 2.0);      // washitsu2 balcony door

// Fusuma (visual) between LDK and washitsu2
const fuG=new THREE.Mesh(new THREE.BoxGeometry(WT,1.95,1.3),M.fusuma);
fuG.position.set(XHE,.975,(6.2+7.5)/2);scene.add(fuG);
// Fusuma between washitsu1 and washitsu2
const fuG2=new THREE.Mesh(new THREE.BoxGeometry(1.3,1.95,WT),M.fusuma);
fuG2.position.set((5+6.3)/2,.975,ZW1S);scene.add(fuG2);

// ────── FLOORS ──────
mkFloor(X0,Z0, XBE,ZBS, M.tile);                   // bath
mkFloor(X0,ZBS, XWE,ZWS-ZBS, M.tile);              // washroom
mkFloor(XWE,ZBS, XWCE-XWE,ZWS-ZBS, M.tile);       // WC
mkFloor(XHW,ZGS, XHE-XHW,ZHS-ZGS, M.wood);        // hallway
mkFloor(XHW,Z0, XHE-XHW,ZGS, M.genkan, -STEP_H);  // genkan (lower)
mkFloor(X0,ZWS, XHE,ZSS-ZWS, M.wood);              // LDK
mkFloor(XHE,Z0, XE-XHE,2.6, M.wood);               // youshitsu
mkFloor(XHE,2.6, XE-XHE,3.2-2.6, M.wood);          // closet

// Tatami: washitsu1
for(let i=0;i<3;i++)for(let j=0;j<2;j++){
  const tw=(XE-XHE)/3,td=(ZW1S-3.2)/2;
  const m=new THREE.Mesh(new THREE.PlaneGeometry(tw-.02,td-.02),M.tatami);
  m.rotation.x=-Math.PI/2;if((i+j)%2===0)m.rotation.z=Math.PI/2;
  m.position.set(XHE+tw*i+tw/2,.003,3.2+td*j+td/2);m.receiveShadow=true;scene.add(m);
}
// Tatami: washitsu2
for(let i=0;i<3;i++)for(let j=0;j<2;j++){
  const tw=(XE-XHE)/3,td=(ZSS-ZW1S)/2;
  const m=new THREE.Mesh(new THREE.PlaneGeometry(tw-.02,td-.02),M.tatami);
  m.rotation.x=-Math.PI/2;if((i+j)%2===1)m.rotation.z=Math.PI/2;
  m.position.set(XHE+tw*i+tw/2,.003,ZW1S+td*j+td/2);m.receiveShadow=true;scene.add(m);
}

mkFloor(X0,ZSS, XE,ZBaS-ZSS, M.conc);  // balcony

// Genkan step visual
box(XHW,-STEP_H,ZGS-.02, XHE-XHW,STEP_H+.002,.04, M.wood);

// ────── CEILING ──────
mkCeil(X0,Z0,XE,ZSS);

// ────── FURNITURE ──────
// Kitchen counter along west wall of LDK
box(.05,0,5, .55,.85,2.2, M.kit,true);
box(.1,.85,5.5, .45,.02,.55, M.met);      // stovetop
box(.1,.82,6.5, .4,.05,.45, M.met);       // sink
box(.05,1.55,5.3, .48,.28,.7, M.hood);    // range hood
box(.05,0,7.5, .58,1.72,.58, M.wht,true); // fridge

// Bathtub
box(.1,0,.15, .75,.5,1.3, M.bath,true);
// Shower pipe
const sp=new THREE.Mesh(new THREE.CylinderGeometry(.015,.015,.7,8),M.met);
sp.position.set(.15,1.5,1.45);scene.add(sp);

// Washing machine
box(.1,0,ZBS+.15, .55,.88,.55, M.wht,true);
// Wash basin + mirror
box(.8,0,ZBS+.1, .65,.72,.42, M.wht,true);
box(.83,.72,ZBS+.13, .58,.03,.35, M.met);
box(.83,.88,ZBS+.02, .58,.65,.02, M.mirror);

// Toilet
box(XWE+.15,0,ZBS+.6, .42,.38,.6, M.wht,true);
box(XWE+.2,.38,ZBS+.4, .32,.28,.18, M.wht);

// Shoe box
box(XHE-.35,0,.08, .3,1.8,.85, M.dkwd,true);

// Closet doors visual
box(XHE+.01,0,2.6, 1.25,1.85,.04, M.door);
box(5.55,0,3.16, 1.4,1.85,.04, M.door);

// ────── LIGHTS ──────
function cLight(x,z,int=.6,col=0xfff5e0){
  const g=new THREE.Mesh(new THREE.BoxGeometry(.35,.025,.35),
    new THREE.MeshStandardMaterial({color:0xfffeee,emissive:0xfffeee,emissiveIntensity:.4}));
  g.position.set(x,WH-.015,z);scene.add(g);
  const p=new THREE.PointLight(col,int,5.5);
  p.position.set(x,WH-.08,z);p.castShadow=true;p.shadow.mapSize.set(512,512);
  scene.add(p);
}
cLight(1.8,5.5,.7);   cLight(1.8,7.2,.35);  // LDK
cLight(5.6,1.3,.5);                           // youshitsu
cLight(5.6,4.5,.5);                           // washitsu1
cLight(5.6,7.0,.5);                           // washitsu2
cLight(.9,.85,.35);                            // bath
cLight(.9,2.4,.35);                            // washroom
cLight(XWE+.4,2.4,.25);                       // WC
cLight(3.4,2.8,.3);                            // hallway

scene.add(new THREE.AmbientLight(0x8899aa,.35));
scene.add(new THREE.HemisphereLight(0x88ccee,0x887766,.25));
const sun=new THREE.DirectionalLight(0xfff8e8,.7);
sun.position.set(3,10,14);sun.castShadow=true;
sun.shadow.mapSize.set(1024,1024);
Object.assign(sun.shadow.camera,{near:1,far:30,left:-10,right:10,top:12,bottom:-4});
scene.add(sun);

// ────── OUTSIDE ──────
for(let i=0;i<6;i++){
  const bw=1.5+Math.random()*3,bh=5+Math.random()*12;
  box(-4+i*3.5+Math.random(),0,13+Math.random()*6,bw,bh,2+Math.random(),
    new THREE.MeshStandardMaterial({color:0xb8b0a5}));
}
const gnd=new THREE.Mesh(new THREE.PlaneGeometry(50,50),
  new THREE.MeshStandardMaterial({color:0x85a060}));
gnd.rotation.x=-Math.PI/2;gnd.position.set(3.5,-.6,22);gnd.receiveShadow=true;scene.add(gnd);

/* ── room zones ── */
const ZONES=[
  {l:'玄関',       x0:XHW,x1:XHE,z0:Z0,z1:ZGS},
  {l:'廊下',       x0:XHW,x1:XHE,z0:ZGS,z1:ZHS},
  {l:'浴室',       x0:X0, x1:XBE,z0:Z0,z1:ZBS},
  {l:'洗面所',     x0:X0, x1:XWE,z0:ZBS,z1:ZWS},
  {l:'トイレ',     x0:XWE,x1:XWCE,z0:ZBS,z1:ZWS},
  {l:'洋室 5.5帖', x0:XHE,x1:XE,z0:Z0,z1:2.6},
  {l:'和室 6帖',   x0:XHE,x1:XE,z0:3.2,z1:ZW1S},
  {l:'和室 4.5帖', x0:XHE,x1:XE,z0:ZW1S,z1:ZSS},
  {l:'LDK 10帖',  x0:X0, x1:XHE,z0:ZWS,z1:ZSS},
  {l:'バルコニー', x0:X0, x1:XE,z0:ZSS,z1:ZBaS},
];
function getZone(x,z){for(const r of ZONES)if(x>=r.x0&&x<=r.x1&&z>=r.z0&&z<=r.z1)return r.l;return '';}

/* ── player state ── */
const dolly=new THREE.Group();
dolly.position.set(3.5,0,.55);
scene.add(dolly);
dolly.add(camera);
camera.position.set(0,PH-STEP_H,0);
let yaw=Math.PI,pitch=0,locked=false,mapOn=true;
const keys={};
const MAP_BOUNDS={x0:X0+PR,x1:XE-PR,z0:Z0+PR,z1:ZBaS-PR};
const fw=new THREE.Vector3(),rt=new THREE.Vector3();
function inBounds(x,z){return x>=MAP_BOUNDS.x0&&x<=MAP_BOUNDS.x1&&z>=MAP_BOUNDS.z0&&z<=MAP_BOUNDS.z1;}
function canMoveTo(x,z){return inBounds(x,z)&&!blocked(x,z);}
function resetKeys(){for(const k in keys)keys[k]=false;}
document.addEventListener('keydown',e=>{keys[e.code]=true;if(e.code==='KeyM'&&!e.repeat)mapOn=!mapOn;});
document.addEventListener('keyup',e=>keys[e.code]=false);
document.addEventListener('pointerlockchange',()=>locked=!!document.pointerLockElement);
document.addEventListener('mousemove',e=>{if(!locked)return;yaw-=e.movementX*SENS;pitch-=e.movementY*SENS;pitch=Math.max(-1.35,Math.min(1.35,pitch));});
function requestDesktopPointerLock(){
  if(renderer.xr.isPresenting)return;
  if(renderer.domElement.requestPointerLock)renderer.domElement.requestPointerLock();
}
function startGame(){
  document.getElementById('overlay').style.display='none';
  requestDesktopPointerLock();
}
renderer.domElement.addEventListener('click',()=>{if(!locked)requestDesktopPointerLock();});
window.addEventListener('blur',resetKeys);
document.addEventListener('visibilitychange',()=>{if(document.hidden)resetKeys();});

/* ── minimap ── */
const mC=document.getElementById('minimap'),mX=mC.getContext('2d');
const ZC={'玄関':'#887766','廊下':'#c8b898','浴室':'#8ab8cc','洗面所':'#90c0a0','トイレ':'#90c0a0','洋室 5.5帖':'#d8c090','和室 6帖':'#a0a850','和室 4.5帖':'#a0a850','LDK 10帖':'#d8c090','バルコニー':'#90aabc'};
function drawMap(px,pz){
  if(!mapOn){mC.style.display='none';return;}
  mC.style.display='block';
  const S=15,OX=6,OZ=5;
  mX.clearRect(0,0,150,190);
  mX.fillStyle='rgba(10,10,15,.6)';mX.fillRect(0,0,150,190);
  for(const r of ZONES){mX.fillStyle=ZC[r.l]||'#888';mX.globalAlpha=.4;mX.fillRect(OX+r.x0*S,OZ+r.z0*S,(r.x1-r.x0)*S,(r.z1-r.z0)*S);}
  mX.globalAlpha=1;mX.strokeStyle='rgba(255,255,255,.7)';mX.lineWidth=1.2;
  for(const s of segs){mX.beginPath();mX.moveTo(OX+s.ax*S,OZ+s.az*S);mX.lineTo(OX+s.bx*S,OZ+s.bz*S);mX.stroke();}
  const mx=OX+px*S,mz=OZ+pz*S;
  mX.fillStyle='#f44';mX.beginPath();mX.arc(mx,mz,3,0,7);mX.fill();
  mX.strokeStyle='#f44';mX.lineWidth=2;mX.beginPath();mX.moveTo(mx,mz);mX.lineTo(mx+Math.sin(yaw)*10,mz+Math.cos(yaw)*10);mX.stroke();
}

/* ── footstep audio ── */
let actx=null,stT=0;
function step(){if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)();const o=actx.createOscillator(),g=actx.createGain();o.type='sine';o.frequency.value=50+Math.random()*20;g.gain.setValueAtTime(.035,actx.currentTime);g.gain.exponentialRampToValueAtTime(.001,actx.currentTime+.1);o.connect(g);g.connect(actx.destination);o.start();o.stop(actx.currentTime+.1);}

/* ── game loop ── */
const clock=new THREE.Clock();
let pZone='';
renderer.setAnimationLoop(function loop(){
  const dt=Math.min(clock.getDelta(),.05);
  if(locked&&!renderer.xr.isPresenting){
    const sprint=keys.ShiftLeft||keys.ShiftRight;
    const spd=SPD*(sprint?SPRT:1);
    fw.set(-Math.sin(yaw),0,-Math.cos(yaw)).normalize();
    rt.set(Math.cos(yaw),0,-Math.sin(yaw)).normalize();
    let mx=0,mz=0;
    if(keys.KeyW){mx+=fw.x;mz+=fw.z;}
    if(keys.KeyS){mx-=fw.x;mz-=fw.z;}
    if(keys.KeyA){mx-=rt.x;mz-=rt.z;}
    if(keys.KeyD){mx+=rt.x;mz+=rt.z;}
    if(mx||mz){
      const l=Math.hypot(mx,mz);mx=mx/l*spd*dt;mz=mz/l*spd*dt;
      const nx=dolly.position.x+mx,nz=dolly.position.z+mz;
      if(canMoveTo(nx,nz)){dolly.position.x=nx;dolly.position.z=nz;}
      else if(canMoveTo(nx,dolly.position.z))dolly.position.x=nx;
      else if(canMoveTo(dolly.position.x,nz))dolly.position.z=nz;
      stT+=spd*dt;if(stT>.55){stT=0;step();}
    }
    const inG=dolly.position.x>XHW&&dolly.position.x<XHE&&dolly.position.z<ZGS;
    const targetY=inG?-STEP_H:0;
    dolly.position.y+=(targetY-dolly.position.y)*.15;
    if(mx||mz)camera.position.y=(PH-STEP_H)+Math.sin(stT*12)*.012;
    else camera.position.y=PH-STEP_H;
  }
  if(!renderer.xr.isPresenting){
    camera.rotation.y=yaw;camera.rotation.x=pitch;
  }
  const z=getZone(dolly.position.x,dolly.position.z);
  const lb=document.getElementById('room-label');
  if(z!==pZone){lb.textContent=z;lb.style.opacity=z?'1':'0';pZone=z;}
  drawMap(dolly.position.x,dolly.position.z);
  renderer.render(scene,camera);
});

window.addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);});
</script>
</body>
</html>
